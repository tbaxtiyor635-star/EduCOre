<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Premium LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sidebar-btn.active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>

    <div id="login-section" class="flex items-center justify-center h-screen bg-gradient-to-br from-slate-900 to-blue-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-96 text-center">
            <div class="text-6xl mb-4">🎓</div>
            <h1 class="text-3xl font-bold text-slate-800 mb-6">EduCore Kirish</h1>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Login" class="w-full p-4 rounded-2xl bg-slate-100 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-pass" placeholder="Parol" class="w-full p-4 rounded-2xl bg-slate-100 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">Kirish</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 bg-slate-900 text-gray-300 flex flex-col p-6 border-r border-white/5">
            <div class="text-2xl font-black text-white italic mb-10 px-2 tracking-tighter">EduCore</div>
            <nav class="flex-1 space-y-2">
                <button onclick="showSection('students')" id="btn-students" class="sidebar-btn active w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all">👥 O'quvchilar</button>
                <button onclick="showSection('groups')" id="btn-groups" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all">📚 Guruhlar</button>
                <div class="pt-6 border-t border-white/10 mt-6 space-y-2">
                    <button onclick="exportToCSV()" class="w-full p-3 rounded-xl hover:bg-white/5 text-green-400 border border-green-500/30 text-xs font-bold uppercase tracking-wider">📤 Export</button>
                    <button onclick="document.getElementById('csvImport').click()" class="w-full p-3 rounded-xl hover:bg-white/5 text-blue-400 border border-blue-500/30 text-xs font-bold uppercase tracking-wider">📥 Import</button>
                    <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="handleImport(event)">
                </div>
            </nav>
            <button onclick="location.reload()" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-2xl">Chiqish</button>
        </div>

        <div class="flex-1 overflow-y-auto p-12">
            <div id="section-students">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-extrabold text-slate-800">O'quvchilar</h2>
                    <button onclick="openModal('student')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">+ Qo'shish</button>
                </div>
                <div class="glass rounded-[2rem] shadow-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-gray-100">
                            <tr>
                                <th class="p-6 text-xs font-bold text-slate-400 uppercase">F.I.SH</th>
                                <th class="p-6 text-xs font-bold text-slate-400 uppercase">Guruh</th>
                                <th class="p-6 text-xs font-bold text-slate-400 uppercase">Balans</th>
                                <th class="p-6 text-xs font-bold text-slate-400 uppercase text-center">Amal</th>
                            </tr>
                        </thead>
                        <tbody id="student-table" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-groups" class="hidden">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-extrabold text-slate-800">Guruhlar</h2>
                    <button onclick="openModal('group')" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all">+ Yangi Guruh</button>
                </div>
                <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800">Ma'lumot</h3>
            <div id="modal-form" class="space-y-4"></div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl">Bekor qilish</button>
                <button id="modal-save-btn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg">Saqlash</button>
            </div>
        </div>
    </div>

    <script>
        // 1. SUPABASE SOZLAMALARI
        const SUPABASE_URL = 'https://dujeoawlcgwdndqaohts.supabase.co'; // orqali to'g'irlangan
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1amVvYXdsY2d3ZG5kcWFvaHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzIwMjUsImV4cCI6MjA5MjAwODAyNX0.riAN1MPgmShznb6LaqKNbe1PzdO_SRtU3J6esSDKMtA'; // kodi
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. LOGIN
        async function login() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if(u === 'admin' && p === '123') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchStudents();
                fetchGroups();
            } else { alert('Xato!'); }
        }

        // 3. BO'LIMLARNI ALMASHTIRISH
        function showSection(section) {
            ['students', 'groups'].forEach(s => {
                document.getElementById(`section-${s}`).classList.toggle('hidden', s !== section);
                document.getElementById(`btn-${s}`).classList.toggle('active', s === section);
            });
        }

        // 4. O'QUVCHILAR BILAN ISHLASH
        async function fetchStudents() {
            const { data, error } = await _supabase.from('students').select('*').order('id', {ascending: false});
            if(error) return console.error(error);
            const body = document.getElementById('student-table');
            body.innerHTML = data.map(s => `
                <tr class="hover:bg-blue-50/50 transition-all">
                    <td class="p-6 font-bold text-slate-800">${s.full_name}</td>
                    <td class="p-6 text-slate-500">${s.group_name || '-'}</td>
                    <td class="p-6 font-black ${s.balance > 0 ? 'text-green-600' : 'text-red-500'}">${Number(s.balance).toLocaleString()} so'm</td>
                    <td class="p-6 text-center"><button onclick="deleteItem('students', ${s.id})" class="text-red-300 hover:text-red-600 transition-all">🗑</button></td>
                </tr>
            `).join('');
        }

        // 5. GURUHLAR BILAN ISHLASH
        async function fetchGroups() {
            const { data, error } = await _supabase.from('groups').select('*');
            if(error) {
                // Agar groups jadvali bazada bo'lmasa, ogohlantirish beradi
                console.log("Eslatma: Supabase-da 'groups' jadvalini yarating.");
                return;
            }
            const container = document.getElementById('groups-container');
            container.innerHTML = data.map(g => `
                <div class="glass p-8 rounded-[2rem] shadow-lg border-t-4 border-indigo-500 hover:scale-105 transition-all">
                    <h4 class="text-2xl font-black text-slate-800 mb-2">${g.name}</h4>
                    <p class="text-slate-500 text-sm mb-6 uppercase tracking-widest font-bold">${g.teacher || 'O'qituvchi tayinlanmagan'}</p>
                    <div class="flex justify-between items-center">
                        <span class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl text-xs font-bold">Dars vaqti: ${g.time || '--:--'}</span>
                        <button onclick="deleteItem('groups', ${g.id})" class="text-red-400">O'chirish</button>
                    </div>
                </div>
            `).join('');
        }

        // 6. MODAL BOSHQARUVI
        function openModal(type) {
            const title = document.getElementById('modal-title');
            const form = document.getElementById('modal-form');
            const btn = document.getElementById('modal-save-btn');
            
            if(type === 'student') {
                title.innerText = "Yangi O'quvchi";
                form.innerHTML = `
                    <input type="text" id="m-name" placeholder="Ism Familiya" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="m-group" placeholder="Guruh" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="number" id="m-balance" placeholder="Balans" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">`;
                btn.onclick = () => saveItem('students');
            } else {
                title.innerText = "Yangi Guruh";
                form.innerHTML = `
                    <input type="text" id="m-gname" placeholder="Guruh Nomi" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="m-teacher" placeholder="O'qituvchi" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="m-time" placeholder="Vaqt (masalan 14:00)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">`;
                btn.onclick = () => saveItem('groups');
            }
            document.getElementById('main-modal').classList.remove('hidden');
        }

        async function saveItem(table) {
            let obj = {};
            if(table === 'students') {
                obj = { full_name: document.getElementById('m-name').value, group_name: document.getElementById('m-group').value, balance: document.getElementById('m-balance').value };
            } else {
                obj = { name: document.getElementById('m-gname').value, teacher: document.getElementById('m-teacher').value, time: document.getElementById('m-time').value };
            }
            const { error } = await _supabase.from(table).insert([obj]);
            if(error) alert(error.message);
            else { closeModal(); table === 'students' ? fetchStudents() : fetchGroups(); }
        }

        async function deleteItem(table, id) {
            if(confirm('O'chirilsinmi?')) {
                await _supabase.from(table).delete().eq('id', id);
                table === 'students' ? fetchStudents() : fetchGroups();
            }
        }

        function closeModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
