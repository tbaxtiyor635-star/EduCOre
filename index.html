<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Premium LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="login-section" class="flex items-center justify-center h-screen bg-gradient-to-br from-blue-700 via-indigo-900 to-slate-900">
        <div class="bg-white/95 p-10 rounded-[2.5rem] shadow-2xl w-96 text-center border border-white/20">
            <div class="text-6xl mb-4">🎓</div>
            <h1 class="text-4xl font-black text-slate-800 mb-2 italic tracking-tighter">EduCore</h1>
            <p class="text-slate-400 text-sm mb-8 font-medium">Boshqaruv paneliga kirish</p>
            <div class="space-y-4">
                <input type="text" id="email" placeholder="Login (admin)" class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="password" placeholder="Parol (123)" class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-500/30 transition-all active:scale-95">Kirish</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 bg-slate-900 text-gray-300 flex flex-col p-6 border-r border-white/5 shadow-2xl">
            <div class="text-2xl font-black text-white italic mb-10 px-2 flex items-center gap-2">
                <span class="text-blue-500">●</span> EduCore
            </div>
            <nav class="flex-1 space-y-2">
                <button class="w-full flex items-center gap-3 p-4 rounded-2xl bg-blue-600 text-white font-bold shadow-lg">👥 O'quvchilar</button>
                <div class="pt-6 border-t border-white/10 mt-6 space-y-3">
                    <button onclick="exportToCSV()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-green-400 border border-green-500/30 font-bold transition-all text-sm">📤 Export Excel</button>
                    <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="handleImport(event)">
                    <button onclick="document.getElementById('csvImport').click()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-blue-400 border border-blue-500/30 font-bold transition-all text-sm">📥 Import Excel</button>
                </div>
            </nav>
            <button onclick="location.reload()" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-2xl transition-all">🚪 Chiqish</button>
        </div>

        <div class="flex-1 overflow-y-auto p-12 bg-[url('https://www.transparenttextures.com/patterns/clean-gray-paper.png')]">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-extrabold text-slate-800">O'quvchilar Ro'yxati</h2>
                    <div class="h-1.5 w-20 bg-blue-600 rounded-full mt-2"></div>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-95">+ Yangi qo'shish</button>
            </div>

            <div class="glass rounded-[2.5rem] shadow-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white uppercase text-xs tracking-widest">
                        <tr>
                            <th class="p-6">Ism Familiya</th>
                            <th class="p-6">Guruh</th>
                            <th class="p-6">Telefon</th>
                            <th class="p-6">Balans</th>
                            <th class="p-6 text-center">Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-100 font-medium text-slate-700 italic">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-slate-800">Yangi o'quvchi</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="Ism Familiya" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-group" placeholder="Guruh nomi" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-phone" placeholder="998..." class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="new-balance" placeholder="Summa" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex gap-4 mt-6">
                    <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-100 rounded-2xl">Bekor qilish</button>
                    <button onclick="saveStudent()" class="flex-1 py-4 bg-green-500 text-white rounded-2xl font-bold hover:bg-green-600 shadow-lg">Saqlash</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SUPABASE SOZLAMALARI (TO'G'RILANGAN)
        const SUPABASE_URL = 'https://dujeoawlcgwndndqaohts.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1amVvYXdsY2d3bmRuZHFhb2h0cyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzEzMzczNDM0LCJleHAiOjIwMjg5NDk0MzR9.7NfGvH8p8Y6X-uI6JzXm8u6tZ-uE6J8P7NfGvH8p8Y6'; // O'zingiz kiritgan anon key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. LOGIN
        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (email === "admin" && pass === "123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                await fetchStudents();
            } else {
                alert("Login yoki parol xato!");
            }
        }

        // 3. MA'LUMOTLARNI YUKLASH
        async function fetchStudents() {
            try {
                const { data, error } = await _supabase
                    .from('students')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('student-table-body');
                tbody.innerHTML = '';

                data.forEach(student => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition-all">
                            <td class="p-6 font-bold text-slate-800">${student.full_name}</td>
                            <td class="p-6 text-slate-500">${student.group_name || "-"}</td>
                            <td class="p-6 text-slate-400 font-mono text-sm">${student.phone || "-"}</td>
                            <td class="p-6 font-black ${student.balance > 0 ? 'text-green-600' : 'text-red-500'}">
                                ${Number(student.balance).toLocaleString()} so'm
                            </td>
                            <td class="p-6 text-center">
                                <button onclick="deleteStudent(${student.id})" class="text-red-300 hover:text-red-600 transition-all text-xl">🗑</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Xato:", err.message);
                alert("Ma'lumotlarni yuklab bo'lmadi. Supabase'da 'Save Policy' bosilganiga ishonch hosil qiling.");
            }
        }

        // 4. SAQLASH
        async function saveStudent() {
            const name = document.getElementById('new-name').value;
            const group = document.getElementById('new-group').value;
            const phone = document.getElementById('new-phone').value;
            const balance = document.getElementById('new-balance').value;

            if(!name) return alert("Ismni kiriting!");

            const { error } = await _supabase
                .from('students')
                .insert([{ 
                    full_name: name, 
                    group_name: group, 
                    phone: phone, 
                    balance: parseInt(balance) || 0 
                }]);

            if (error) {
                alert("Xatolik: " + error.message);
            } else {
                closeModal();
                fetchStudents();
            }
        }

        // 5. O'CHIRISH
        async function deleteStudent(id) {
            if(confirm("Haqiqatan ham o'chirmoqchimisiz?")) {
                const { error } = await _supabase.from('students').delete().eq('id', id);
                if (!error) fetchStudents();
            }
        }

        // 6. EXPORT
        async function exportToCSV() {
            const { data } = await _supabase.from('students').select('*');
            if(!data || data.length === 0) return alert("Ma'lumot yo'q!");
            
            let csvContent = "data:text/csv;charset=utf-8,Ism Familiya,Guruh,Tel,Balans\n";
            data.forEach(s => {
                csvContent += `${s.full_name},${s.group_name},${s.phone},${s.balance}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "EduCore_Oquvchilar.csv");
            document.body.appendChild(link);
            link.click();
        }

        // 7. IMPORT
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split('\n').slice(1);
                for (let row of rows) {
                    const col = row.split(',');
                    if (col[0]) {
                        await _supabase.from('students').insert([{
                            full_name: col[0].trim(),
                            group_name: col[1]?.trim(),
                            phone: col[2]?.trim(),
                            balance: parseInt(col[3]) || 0
                        }]);
                    }
                }
                alert("Import yakunlandi!");
                fetchStudents();
            };
            reader.readAsText(file);
        }

        function openModal() { document.getElementById('student-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
    </script>
</body>
</html>
