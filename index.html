<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Premium Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100 screen;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="login-section" class="flex items-center justify-center h-screen bg-gradient-to-tr from-slate-900 via-blue-900 to-slate-900">
        <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-2xl w-96 border border-white/20 text-center">
            <div class="text-5xl mb-4">🎓</div>
            <h1 class="text-3xl font-black text-white mb-2 italic">EduCore</h1>
            <p class="text-blue-200 text-sm mb-8 font-medium">LMS Boshqaruv Tizimi</p>
            <div class="space-y-4 text-left">
                <input type="text" id="email" placeholder="Login" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-white/50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="password" id="password" placeholder="Parol" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-white/50 outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="login()" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold hover:bg-blue-400 transition-all shadow-lg active:scale-95">Kirish</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 bg-slate-900/90 backdrop-blur-lg text-gray-300 flex flex-col p-6 border-r border-white/10">
            <div class="text-2xl font-black text-white italic mb-10 px-2 flex items-center gap-2">
                <span class="text-blue-400">●</span> EduCore
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="showSection('students')" class="w-full flex items-center gap-3 p-4 rounded-2xl bg-blue-600 text-white font-bold shadow-blue-500/20 shadow-lg">👥 O'quvchilar</button>
                <div class="pt-6 border-t border-white/10 mt-6 space-y-2">
                    <button onclick="exportToCSV()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-green-400 border border-green-500/30 font-bold transition-all text-sm">📤 Export Excel</button>
                    <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="handleImport(event)">
                    <button onclick="document.getElementById('csvImport').click()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-blue-400 border border-blue-500/30 font-bold transition-all text-sm">📥 Import Excel</button>
                </div>
            </nav>
            <button onclick="location.reload()" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-2xl transition-all">🚪 Chiqish</button>
        </div>

        <div class="flex-1 overflow-y-auto p-12 bg-[url('https://www.transparenttextures.com/patterns/clean-gray-paper.png')]">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="section-title" class="text-4xl font-extrabold text-slate-800 tracking-tight">O'quvchilar Ro'yxati</h2>
                    <div class="h-1 w-20 bg-blue-600 rounded-full mt-2"></div>
                </div>
                <button onclick="openModal()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-95">+ O'quvchi qo'shish</button>
            </div>

            <div class="glass rounded-[2rem] shadow-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white uppercase text-xs tracking-widest">
                        <tr>
                            <th class="p-6">O'quvchi ismi</th>
                            <th class="p-6">Guruh</th>
                            <th class="p-6">Telefon</th>
                            <th class="p-6">Balans</th>
                            <th class="p-6 text-center">Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-100 italic">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dujeoawlcgwndndqaohts.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY_HERE'; // O'zingizning API KEYingizni qo'ying
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Funksiyalarni (login, fetchStudents, saveStudent, deleteStudent, exportToCSV, handleImport) 
        // avvalgi javobimdagi kabi bu yerga joylashtiring.
    </script>
</body>
</html>
