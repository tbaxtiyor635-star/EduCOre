<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - O'quv Markazi Platformasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-100 min-h-screen text-slate-800">

    <div id="login-section" class="flex items-center justify-center h-screen bg-slate-100">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border-b-8 border-blue-600">
            <h1 class="text-4xl font-black text-center text-blue-600 mb-8 italic tracking-tighter">EduCore</h1>
            <div class="space-y-4">
                <input type="text" id="email" placeholder="Login (admin)"
                    class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="password" placeholder="Parol (123)"
                    class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="login()"
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transform hover:-translate-y-1 transition-all">
                    Tizimga kirish
                </button>
            </div>
            <p class="text-center text-gray-400 text-xs mt-6">© 2026 EduCore LMS System</p>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 bg-slate-900 text-gray-300 flex flex-col shadow-2xl">
            <div class="p-8 text-3xl font-black text-white border-b border-slate-800 italic">EduCore</div>
            <nav class="flex-1 p-6 space-y-3">
                <button onclick="showSection('students')" class="w-full flex items-center gap-3 p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold">
                    <span>👥</span> O'quvchilar
                </button>
                <button onclick="showSection('groups')" class="w-full flex items-center gap-3 p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold text-gray-500">
                    <span>📚</span> Guruhlar (Tez orada)
                </button>
                
                <div class="pt-6 border-t border-slate-800 mt-6 space-y-3">
                    <button onclick="exportToCSV()" class="w-full flex items-center gap-3 p-4 rounded-xl bg-green-600/10 text-green-400 hover:bg-green-600 hover:text-white transition-all font-bold border border-green-600/20">
                        <span>📤</span> Export Excel (CSV)
                    </button>
                    <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="handleImport(event)">
                    <button onclick="document.getElementById('csvImport').click()" class="w-full flex items-center gap-3 p-4 rounded-xl bg-blue-600/10 text-blue-400 hover:bg-blue-600 hover:text-white transition-all font-bold border border-blue-600/20">
                        <span>📥</span> Import Excel (CSV)
                    </button>
                </div>
            </nav>
            <button onclick="location.reload()" class="p-6 text-sm text-red-400 border-t border-slate-800 hover:bg-red-900 hover:text-white transition-all text-left font-bold">
                🚪 Tizimdan chiqish
            </button>
        </div>

        <div class="flex-1 overflow-y-auto bg-gray-50 p-10">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 id="section-title" class="text-4xl font-extrabold text-slate-800 tracking-tight">O'quvchilar Boshqaruvi</h2>
                    <p class="text-gray-500 mt-2 font-medium">Barcha o'quvchilar ma'lumotlari va to'lov holatlari</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl hover:bg-blue-700 transform hover:scale-105 transition-all font-bold">
                    + Yangi o'quvchi qo'shish
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-gray-100">
                        <tr>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs tracking-widest">Ism Familiya</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs tracking-widest">Guruh</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs tracking-widest">Telefon</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs tracking-widest">Balans</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs tracking-widest text-center">Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-50 text-sm font-medium">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-10 w-full max-w-md shadow-2xl transform transition-all">
            <h3 class="text-2xl font-black mb-8 text-slate-800 border-b pb-4">Yangi o'quvchi kartochkasi</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">To'liq ismi</label>
                    <input type="text" id="new-name" placeholder="Masalan: Ali Valiyev" class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Guruh nomi</label>
                    <input type="text" id="new-group" placeholder="Ingliz tili A2" class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Telefon raqami</label>
                    <input type="text" id="new-phone" placeholder="998901234567" class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Boshlang'ich to'lov</label>
                    <input type="number" id="new-balance" placeholder="500000" class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="closeModal()" class="flex-1 py-4 text-gray-500 font-bold hover:bg-gray-100 rounded-xl transition-all">Bekor qilish</button>
                    <button onclick="saveStudent()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-black hover:bg-green-700 shadow-lg transition-all">Saqlash</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SUPABASE SOZLAMALARI (O'zingizniki bilan almashtiring)
        const SUPABASE_URL = 'https://dujeoawlcgwdndqaohts.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1amVvYXdsY2d3ZG5kcWFvaHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzIwMjUsImV4cCI6MjA5MjAwODAyNX0.riAN1MPgmShznb6LaqKNbe1PzdO_SRtU3J6esSDKMtA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. LOGIN
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (email === "admin" && pass === "123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchStudents();
            } else {
                alert("Xato! Login: admin, Parol: 123");
            }
        }

        // 3. MA'LUMOTLARNI YUKLASH
        async function fetchStudents() {
            const { data, error } = await _supabase
                .from('students')
                .select('*')
                .order('id', { ascending: false });

            if (error) { console.error(error); return; }

            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';

            data.forEach(student => {
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50/50 transition-colors group">
                        <td class="p-6 font-bold text-slate-800 tracking-tight">${student.full_name}</td>
                        <td class="p-6"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-xs font-black uppercase">${student.group_name || "Noma'lum"}</span></td>
                        <td class="p-6 text-gray-500 font-mono">${student.phone || '-'}</td>
                        <td class="p-6 font-black ${student.balance > 0 ? 'text-green-600' : 'text-red-500'}">${(student.balance || 0).toLocaleString()} so'm</td>
                        <td class="p-6 text-center">
                            <button onclick="deleteStudent(${student.id})" class="text-red-300 hover:text-red-600 transition-colors text-xl">🗑</button>
                        </td>
                    </tr>`;
            });
        }

        // 4. O'QUVCHI QO'SHISH
        async function saveStudent() {
            const name = document.getElementById('new-name').value;
            const group = document.getElementById('new-group').value;
            const phone = document.getElementById('new-phone').value;
            const balance = document.getElementById('new-balance').value;

            if(!name) { alert("Ismni kiriting!"); return; }

            const { error } = await _supabase
                .from('students')
                .insert([{ 
                    full_name: name, 
                    group_name: group, 
                    phone: phone, 
                    balance: parseInt(balance) || 0 
                }]);

            if (error) {
                alert("Xatolik: " + error.message);
            } else {
                closeModal();
                fetchStudents();
                // Tozalash
                document.getElementById('new-name').value = '';
                document.getElementById('new-group').value = '';
                document.getElementById('new-phone').value = '';
                document.getElementById('new-balance').value = '';
            }
        }

        // 5. O'CHIRISH
        async function deleteStudent(id) {
            if(confirm("Ushbu o'quvchini tizimdan butunlay o'chirmoqchimisiz?")) {
                const { error } = await _supabase.from('students').delete().eq('id', id);
                if (!error) fetchStudents();
            }
        }

        // 6. EXPORT (CSV)
        async function exportToCSV() {
            const { data } = await _supabase.from('students').select('*');
            if(!data || data.length === 0) { alert("Eksport uchun ma'lumot yo'q!"); return; }

            let csvContent = "data:text/csv;charset=utf-8,Ism Familiya,Guruh,Telefon,Balans\n";
            data.forEach(s => {
                csvContent += `${s.full_name},${s.group_name || ''},${s.phone || ''},${s.balance || 0}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "EduCore_Students_List.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 7. IMPORT (CSV)
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); 
                let count = 0;

                for (let row of rows) {
                    const columns = row.split(',');
                    if (columns.length >= 1 && columns[0].trim() !== "") {
                        const { error } = await _supabase.from('students').insert([{
                            full_name: columns[0].trim(),
                            group_name: columns[1]?.trim() || '',
                            phone: columns[2]?.trim() || '',
                            balance: parseInt(columns[3]) || 0
                        }]);
                        if(!error) count++;
                    }
                }
                alert(`${count} ta o'quvchi muvaffaqiyatli qo'shildi!`);
                fetchStudents();
            };
            reader.readAsText(file);
        }

        // UI FUNKSIYALAR
        function openModal() { document.getElementById('student-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
        function showSection(name) {
            document.getElementById('section-title').innerText = name === 'students' ? "O'quvchilar Boshqaruvi" : "Guruhlar Bo'limi";
        }
    </script>
</body>
</html>
