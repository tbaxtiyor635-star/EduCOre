<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50">

    <div id="login-section" class="flex items-center justify-center h-screen bg-gradient-to-br from-blue-700 via-indigo-800 to-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-96 text-center border border-white/20">
            <div class="text-6xl mb-4">🎓</div>
            <h1 class="text-4xl font-black text-slate-800 mb-2 italic tracking-tighter">EduCore</h1>
            <p class="text-slate-400 text-sm mb-8 font-medium">O'quv markazi boshqaruv tizimi</p>
            <div class="space-y-4">
                <input type="text" id="email" placeholder="Login (admin)" 
                    class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-700">
                <input type="password" id="password" placeholder="Parol (123)" 
                    class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-700">
                <button onclick="login()" 
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-500/30 transition-all active:scale-95">
                    Tizimga kirish
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 bg-slate-900 text-gray-300 flex flex-col p-6 border-r border-white/5">
            <div class="text-2xl font-black text-white italic mb-10 px-2 flex items-center gap-2">
                <span class="text-blue-500">●</span> EduCore
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="showSection('students')" class="w-full flex items-center gap-3 p-4 rounded-2xl bg-blue-600 text-white font-bold shadow-lg">👥 O'quvchilar</button>
                <div class="pt-6 border-t border-white/10 mt-6 space-y-3">
                    <button onclick="exportToCSV()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-green-400 border border-green-500/30 font-bold transition-all text-sm">📤 Export Excel</button>
                    <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="handleImport(event)">
                    <button onclick="document.getElementById('csvImport').click()" class="w-full p-4 rounded-2xl hover:bg-white/5 text-blue-400 border border-blue-500/30 font-bold transition-all text-sm">📥 Import Excel</button>
                </div>
            </nav>
            <button onclick="location.reload()" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-2xl transition-all">🚪 Chiqish</button>
        </div>

        <div class="flex-1 overflow-y-auto p-12">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="section-title" class="text-4xl font-extrabold text-slate-800">O'quvchilar Ro'yxati</h2>
                    <div class="h-1.5 w-20 bg-blue-600 rounded-full mt-2"></div>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-95">+ Yangi qo'shish</button>
            </div>

            <div class="glass rounded-[2rem] shadow-xl overflow-hidden border border-white">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 border-b border-gray-200">
                        <tr>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs">Ism Familiya</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs">Guruh</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs">Tel</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs">Balans</th>
                            <th class="p-6 font-bold text-slate-600 uppercase text-xs text-center">Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-100 font-medium text-slate-700">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-slate-800">Yangi o'quvchi</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="Ism Familiya" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-group" placeholder="Guruh nomi" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-phone" placeholder="998..." class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="new-balance" placeholder="To'lov summasi" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex gap-4 mt-6">
                    <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-100 rounded-2xl">Bekor qilish</button>
                    <button onclick="saveStudent()" class="flex-1 py-4 bg-green-500 text-white rounded-2xl font-bold hover:bg-green-600 shadow-lg shadow-green-500/20">Saqlash</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SUPABASE SOZLAMALARI
        const SUPABASE_URL = 'https://dujeoawlcgwndndqaohts.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1amVvYXdsY2d3ZG5kcWFvaHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzIwMjUsImV4cCI6MjA5MjAwODAyNX0.riAN1MPgmShznb6LaqKNbe1PzdO_SRtU3J6esSDKMtA'; // <-- Rasmdagi anon keyni shu yerga qo'ying
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. LOGIN FUNKSIYASI
        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (email === "admin" && pass === "123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                await fetchStudents(); // Ma'lumotlarni yuklashni kutamiz
            } else {
                alert("Xato! Login: admin, Parol: 123");
            }
        }

        // 3. MA'LUMOTLARNI BAZADAN OLISH
        async function fetchStudents() {
            try {
                const { data, error } = await _supabase
                    .from('students')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('student-table-body');
                tbody.innerHTML = '';

                data.forEach(student => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-all group">
                            <td class="p-6 font-bold text-slate-800">${student.full_name}</td>
                            <td class="p-6 text-slate-500 text-sm">${student.group_name || "-"}</td>
                            <td class="p-6 text-slate-500 font-mono text-sm">${student.phone || "-"}</td>
                            <td class="p-6 font-black ${student.balance > 0 ? 'text-green-600' : 'text-red-500'}">
                                ${student.balance ? student.balance.toLocaleString() : 0} so'm
                            </td>
                            <td class="p-6 text-center">
                                <button onclick="deleteStudent(${student.id})" class="text-red-400 hover:text-red-600 transition-all">🗑</button>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Xatolik:", err.message);
                alert("Bazaga ulanishda xato! Supabase keyni tekshiring.");
            }
        }

        // 4. YANGI O'QUVCHI QO'SHISH
        async function saveStudent() {
            const name = document.getElementById('new-name').value;
            const group = document.getElementById('new-group').value;
            const phone = document.getElementById('new-phone').value;
            const balance = document.getElementById('new-balance').value;

            if(!name) return alert("Ismni kiriting!");

            const { error } = await _supabase
                .from('students')
                .insert([{ full_name: name, group_name: group, phone: phone, balance: parseInt(balance) || 0 }]);

            if (error) {
                alert("Xatolik: " + error.message);
            } else {
                closeModal();
                fetchStudents();
                document.getElementById('new-name').value = '';
                document.getElementById('new-group').value = '';
                document.getElementById('new-phone').value = '';
                document.getElementById('new-balance').value = '';
            }
        }

        // 5. O'CHIRISH
        async function deleteStudent(id) {
            if(confirm("O'chirilsinmi?")) {
                const { error } = await _supabase.from('students').delete().eq('id', id);
                if (!error) fetchStudents();
            }
        }

        // 6. EXPORT
        async function exportToCSV() {
            const { data } = await _supabase.from('students').select('*');
            if(!data) return;
            let csvContent = "data:text/csv;charset=utf-8,Ism,Guruh,Tel,Balans\n";
            data.forEach(s => {
                csvContent += `${s.full_name},${s.group_name},${s.phone},${s.balance}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "EduCore_Students.csv");
            document.body.appendChild(link);
            link.click();
        }

        // 7. IMPORT
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1);
                for (let row of rows) {
                    const columns = row.split(',');
                    if (columns.length >= 1 && columns[0].trim() !== "") {
                        await _supabase.from('students').insert([{
                            full_name: columns[0].trim(),
                            group_name: columns[1]?.trim() || '',
                            phone: columns[2]?.trim() || '',
                            balance: parseInt(columns[3]) || 0
                        }]);
                    }
                }
                alert("Import bajarildi!");
                fetchStudents();
            };
            reader.readAsText(file);
        }

        function openModal() { document.getElementById('student-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
        function showSection(name) {
            document.getElementById('section-title').innerText = name === 'students' ? "O'quvchilar Ro'yxati" : "Guruhlar Bo'limi";
        }
    </script>
</body>
</html>
